app = "chat-service-academy"
primary_region = "gru"

[env]
    SPRING_PROFILES_ACTIVE = "prod"
    LLM_PROVIDER = "groq"
    DOCUMENT_SERVICE_URL = "https://document-service-academy.fly.dev"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1   # limitá a 1 machine máximo


  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/actuator/health"


[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
