server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres-chat}:${DB_PORT:5432}/${DB_NAME:ai_chat_db}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

llm:
  provider: groq
  groq:
    api-key: ${GROQ_API_KEY}

cloudflare:
  account-id: ${CLOUDFLARE_ACCOUNT_ID}
  api-token: ${CLOUDFLARE_API_TOKEN}
