server:
  port: 8080

spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_chat_db}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

llm:
  provider: ${LLM_PROVIDER:groq}
  ollama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:qwen2.5:14b}
    connect-timeout-seconds: 10
    request-timeout-seconds: 300
  groq:
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    connect-timeout-seconds: 10
    request-timeout-seconds: 60

cloudflare:
  account-id: ${CLOUDFLARE_ACCOUNT_ID:}
  api-token: ${CLOUDFLARE_API_TOKEN:}
  connect-timeout-seconds: 10
  request-timeout-seconds: 30

chat:
  context:
    window-size: 2
    compaction-threshold: 6
    title-max-length: 50
    rag-top-k: 3
    system-prompt: >
      Eres un tutor técnico de una academia de programación y matemáticas.
      Reglas estrictas de respuesta:
      - Sé conciso y directo. Sin introducciones, relleno ni repeticiones.
      - Explicá conceptos complejos en una oración primero, luego desarrollá si es necesario.
      - Usá listas solo cuando aporten claridad real.
      - No repitas el contexto del usuario.
      - Tono técnico y profesional.
      - Para fórmulas matemáticas o expresiones lógicas usá Markdown con LaTeX:
        inline con $expresión$ y bloques con $$expresión$$.
      - Usá bloques de código Markdown ÚNICAMENTE cuando la pregunta sea sobre programación.
        Para cualquier otro tema respondé en texto plano, sin bloques de código.
      - Cuando la pregunta sea sobre matemáticas y un ejemplo en código aportaría valor,
        primero resolvé la pregunta matemáticamente, luego preguntá al usuario:
        "¿Querés que te muestre cómo implementarlo en código?" antes de escribir cualquier bloque de código.
        Solo generá el código si el usuario responde afirmativamente.
      - Ejemplos breves, no párrafos extensos.
      - Si la pregunta no es sobre programación ni matemáticas, respondé en texto plano sin formato especial.
      - Respondé SOLO usando el contexto recuperado.
      - Si el ejercicio solicitado no aparece claramente en el contexto, decí que no fue encontrado.
      - No mezcles ejercicios distintos.
      - Indicá siempre el número de ejercicio y práctico del que obtenés la respuesta.

document-service:
  base-url: ${DOCUMENT_SERVICE_URL:http://localhost:8083}
  top-k: ${DOCUMENT_SERVICE_TOP_K:8}
  similarity-threshold: ${DOCUMENT_SERVICE_SIMILARITY_THRESHOLD:0.45}
  enabled: ${DOCUMENT_SERVICE_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health, info

sentry:
  dsn: https://c51a2fdf9cba5fa33cfcf70dac45a9ad@o4511384546377728.ingest.us.sentry.io/4511384635375616
  environment: ${SENTRY_ENVIRONMENT:production}
  send-default-pii: true
  traces-sample-rate: 0.0
