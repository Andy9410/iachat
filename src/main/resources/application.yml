server:
  port: 8080

spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_chat_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

llm:
  provider: ${LLM_PROVIDER:groq}
  ollama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:qwen2.5:14b}
    connect-timeout-seconds: 10
    request-timeout-seconds: 300
  groq:
    api-key: ${GROQ_API_KEY:}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}
    connect-timeout-seconds: 10
    request-timeout-seconds: 60

chat:
  context:
    window-size: 2
    compaction-threshold: 6

management:
  endpoints:
    web:
      exposure:
        include: health, info
