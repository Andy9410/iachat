spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-purposes-only-padded-to-256bits-minimum

llm:
  provider: mock
  ollama:
    base-url: http://localhost:11434
    model: qwen2.5:14b
    connect-timeout-seconds: 10
    request-timeout-seconds: 1200

chat:
  context:
    window-size: 2
    compaction-threshold: 6
